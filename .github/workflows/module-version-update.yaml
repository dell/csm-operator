name: Update module versions in CSM-Operator
# reusable workflow
on:  # yamllint disable-line rule:truthy
  workflow_call:
  workflow_dispatch:
    inputs:
      csm-version:
        description: 'CSM program version, ex: v1.16.0, v1.17.0, ...'
        required: true
      operator-version:
        description: "Latest operator version, ex: v1.11.0, v1.12.0, ..."
        required: true
        type: string
jobs:
  version-update:
    uses: CSM/actions/.github/workflows/operator-module-version-update.yaml@usr/luke_lau/gh-action-modules-refactor
    name: CSM Operator Module Version Update
    with:
      csm-version: ${{ inputs.csm-version }}
      operator-version: ${{ inputs.operator-version}}
    secrets: inherit
