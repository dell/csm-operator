# This is combination of all innersource actions.
#
# Do not edit this file
# Mandated by https://eos2git.cec.lab.emc.com/CSW/innersource
name: Mandatory innersource actions
on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
jobs:
  # See https://copier.readthedocs.io/
  call-copier:
    uses: CSW/actions/.github/workflows/copier.yml@main
    secrets: inherit
  # See https://github.com/marketplace/actions/close-stale-issues
  call-stale:
    uses: CSW/actions/.github/workflows/stale.yml@main
    secrets: inherit
  # See https://github.com/markdownlint/markdownlint
  call-markdown:
    uses: CSW/actions/.github/workflows/markdown.yml@main
    secrets: inherit
  # See https://yamllint.readthedocs.io/
  call-yamllint:
    uses: CSW/actions/.github/workflows/yamllint.yml@main
    secrets: inherit
  call-conflict:
    uses: CSW/actions/.github/workflows/conflict-markers.yml@main
    secrets: inherit
  call-actionlint:
    uses: CSW/actions/.github/workflows/actionlint.yml@main
    secrets: inherit
  # See https://github.com/RoadieHQ/backstage-entity-validator
  call-nexus:
    uses: CSW/actions/.github/workflows/nexus.yml@main
    secrets: inherit
  # See https://github.com/marketplace/actions/first-interaction
  call-greeting:
    uses: CSW/actions/.github/workflows/greeting.yml@main
    secrets: inherit
  # See https://scorecard.dev/ and https://github.com/ossf/scorecard-action
  call-scorecard:
    uses: CSW/actions/.github/workflows/scorecard.yml@main
    secrets: inherit
