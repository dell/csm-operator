name: Update CSM Operator version
# reusable workflow
on:  # yamllint disable-line rule:truthy
  workflow_call:
  workflow_dispatch:
    inputs:
      csm-version:
        description: "CSM program version, ex: v1.16.0, v1.17.0, ..."
        required: true
      csm-operator-version:
        description: "Latest operator version, ex: v1.11.0, v1.12.0, ..."
        required: true
        type: string

jobs:
  version-update:
    uses: CSM/actions/.github/workflows/operator-version-update.yaml@main
    name: Operator version update
    with:
      csm-version: ${{ inputs.csm-version }}
      csm-operator-version: ${{ inputs.csm-operator-version}}
    secrets: inherit
