# This workflow is used to run several innersource linters like yaml and markdown
#
# Do not edit this file
# Mandated by https://eos2git.cec.lab.emc.com/CSW/innersource
name: Innersource Linters
on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
  pull_request:
jobs:
  # See https://github.com/markdownlint/markdownlint
  call-markdown:
    uses: CSW/actions/.github/workflows/markdown.yml@main
    secrets: inherit
  # See https://yamllint.readthedocs.io/
  call-yamllint:
    uses: CSW/actions/.github/workflows/yamllint.yml@main
    secrets: inherit
  # See https://git-scm.com/book/en/v2/Git-Tools-Advanced-Merging
  call-conflict:
    uses: CSW/actions/.github/workflows/conflict-markers.yml@main
    secrets: inherit
  call-actionlint:
    uses: CSW/actions/.github/workflows/actionlint.yml@main
    secrets: inherit
  # See https://github.com/RoadieHQ/backstage-entity-validator
  call-nexus:
    uses: CSW/actions/.github/workflows/nexus.yml@main
    secrets: inherit
