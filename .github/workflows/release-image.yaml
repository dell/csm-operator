name: Release CSM Image
# Invocable as a reusable workflow
# Can be manually triggered
on: # yamllint disable-line rule:truthy
  workflow_call:
  workflow_dispatch:
    inputs:
      option:
        description: "Select type of release. If first release, use major and it will release v1.0.0."
        required: true
        type: choice
        default: "minor"
        options:
          - major
          - minor
          - patch
          - version
      version:
        description: "Specific semver version to release. Only used when 'version' is the selected option. Example: v2.1.x."
        required: false
        type: string
      artifactory:
        description: "Select where to push the release images."
        required: true
        type: choice
        default: "quay"
        options:
          - quay
          - csm

jobs:
  csm-release:
    name: Release Images
    uses: CSM/actions/.github/workflows/release-image.yaml@main
    with:
      option: ${{ github.event.inputs.option || 'minor' }}
      version: ${{ github.event.inputs.version || '' }}
      images: "<insert comma-separated list of images, no spaces for multiple images>"
      artifactory: ${{ github.event.inputs.artifactory || 'quay' }}
    secrets: inherit
