# Example input file for module-version-update.
#
# Usage:
#   go run .github/scripts/module-version-update/ \
#     --repo . \
#     --input .github/scripts/module-version-update/example-input.yaml \
#     --dry-run

# Images maps fully-qualified container image references to their target tags.
# The tool walks every file in the repo tree and replaces <image>:<old-tag>
# with <image>:<new-tag> using regex. No hardcoded file lists or glob patterns.
images:
  # Observability metrics images
  quay.io/dell/container-storage-modules/karavi-metrics-powerflex: v1.14.0
  quay.io/dell/container-storage-modules/csm-metrics-powermax: v1.10.0
  quay.io/dell/container-storage-modules/csm-metrics-powerscale: v1.12.0
  quay.io/dell/container-storage-modules/csm-metrics-powerstore: v1.15.0

  # OpenTelemetry collector (both registries)
  ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector: 0.142.0
  docker.io/otel/opentelemetry-collector: 0.143.1

  # Resiliency
  quay.io/dell/container-storage-modules/karavi-resiliency: v1.15.0

  # Replication
  quay.io/dell/container-storage-modules/dell-csi-replicator: v1.15.0
  quay.io/dell/container-storage-modules/dell-replication-controller: v1.15.0

  # Reverse proxy
  quay.io/dell/container-storage-modules/csipowermax-reverseproxy: v2.16.0

  # Authorization v2
  quay.io/dell/container-storage-modules/csm-authorization-sidecar: v2.5.0
  quay.io/dell/container-storage-modules/csm-authorization-proxy: v2.5.0
  quay.io/dell/container-storage-modules/csm-authorization-tenant: v2.5.0
  quay.io/dell/container-storage-modules/csm-authorization-role: v2.5.0
  quay.io/dell/container-storage-modules/csm-authorization-storage: v2.5.0
  quay.io/dell/container-storage-modules/csm-authorization-controller: v2.5.0

# ConfigVersions maps YAML module names to their target configVersion.
# The tool finds "name: <module>" and updates the nearest "configVersion".
configVersions:
  observability: v1.15.0
  resiliency: v1.15.0
  replication: v1.14.0
  authorization: v2.5.0
  authorization-proxy-server: v2.5.0
  csireverseproxy: v2.15.0

# VersionDirs maps directory basenames (auto-discovered by scanning for
# directories with 2+ semver subdirs) to their target version.
# If the target doesn't exist, it's created from the current latest.
# Oldest directories are pruned to keep N, N-1, N-2.
versionDirs:
  resiliency: v1.15.0
  observability: v1.15.0
  replication: v1.14.0
  authorization: v2.5.0
  csireverseproxy: v2.15.0
