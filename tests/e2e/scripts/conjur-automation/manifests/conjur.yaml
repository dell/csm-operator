# Source: conjur-oss/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: conjur-conjur-oss
  labels: &AppConjurLabels
    app: conjur-oss
    chart: conjur-oss-2.0.7
    release: conjur
    heritage: Helm
    app.kubernetes.io/name: conjur
    app.kubernetes.io/component: service
spec:
  replicas: 1
  selector:
    matchLabels: *AppConjurLabels
  template:
    metadata:
      labels: *AppConjurLabels
      annotations:
        # Automatically roll deployment if dependent secrets have been changed
        checksum/secrets: 0c55c0eb6887b53048a101760605eef5027df5182e4f7f6517649d8ba09a50cd
        checksum/ssl-cert: 3f44bd62322cf0436190443a9a738e763e08b29ae5c90900e152eb2bcf75925d
        checksum/nginx-configmap: ab306be888df4e4b40b24c9816b8db8b5b055cb803427cd37480de55b908e076
    spec:
      serviceAccountName: conjur-conjur-oss
      volumes:
      - name: conjur-conjur-ssl-cert-volume
        secret:
          secretName: conjur-conjur-ssl-cert
          # Permission == 0400. JSON spec doesn't support octal notation.
          defaultMode: 256
      - name: conjur-conjur-ssl-ca-cert-volume
        secret:
          secretName: conjur-conjur-ssl-ca-cert
          # Permission == 0400. JSON spec doesn't support octal notation.
          defaultMode: 256
      - name: conjur-conjur-configmap-volume
        configMap:
          name: conjur-conjur-nginx-configmap
          items:
            - key: nginx_conf
              path: nginx.conf
            - key: mime_types
              path: mime.types
            - key: dhparams
              path: dhparams.pem
            - key: conjur_site
              path: sites-enabled/conjur.conf
      containers:
      - name: conjur-nginx
        image: "nginx:1.15"
        imagePullPolicy: Always
        ports:
        - containerPort: 9443
          name: https
        - containerPort: 9000
          name: http
        livenessProbe:
          httpGet:
            path: /status
            scheme: HTTPS
            port: https
          initialDelaySeconds: 1
          periodSeconds: 5
          timeoutSeconds: 3
          # 1 seconds * 180 = 3 minutes
          failureThreshold: 180
        readinessProbe:
          httpGet:
            path: /status
            scheme: HTTPS
            port: https
          initialDelaySeconds: 1
          periodSeconds: 5
          timeoutSeconds: 3
          # 1 seconds * 180 = 3 minutes
          failureThreshold: 180
        volumeMounts:
        - name: conjur-conjur-ssl-cert-volume
          mountPath: /opt/conjur/etc/ssl/cert
          readOnly: true
        - name: conjur-conjur-ssl-ca-cert-volume
          mountPath: /opt/conjur/etc/ssl/ca
          readOnly: true
        - name: conjur-conjur-configmap-volume
          mountPath: /etc/nginx
          readOnly: true

      - name: conjur-oss
        image: "cyberark/conjur:latest"
        imagePullPolicy: Always
        # If the configured account has already been created, then start the
        # server without account creation. Otherwise, start the server with
        # account creation.
        command: ["bash"]
        args:
        - -c
        - |
           if conjurctl role retrieve-key dev-cluster:user:admin >/dev/null 2>&1; then
             conjurctl server;
           else
             conjurctl server --account=dev-cluster | grep -v 'API key for admin:';
           fi

        ports:
          - name: http
            containerPort: 8080
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 1
          periodSeconds: 5
          timeoutSeconds: 2
          # 1 seconds * 180 = 3 minutes
          failureThreshold: 180
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 1
          periodSeconds: 30
          timeoutSeconds: 30
          # 1 seconds * 180 = 3 minutes
          failureThreshold: 180
        env:
        - name: PORT
          value: "8080"
        - name: CONJUR_AUTHENTICATORS
          valueFrom:
            secretKeyRef:
              name: conjur-conjur-authenticators
              key: key
        - name: CONJUR_DATA_KEY
          valueFrom:
            secretKeyRef:
              name: conjur-conjur-data-key
              key: key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: conjur-conjur-database-url
              key: key
        - name: CONJUR_ACCOUNT
          value: dev-cluster
        - name: CONJUR_LOG_LEVEL
          value: info
        resources:
            {}
---
# Source: conjur-oss/templates/postgres.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: conjur-postgres
  labels: &AppPostgresLabels
    app: conjur-oss-postgres
    chart: conjur-oss-2.0.7
    release: conjur
    heritage: Helm
    app.kubernetes.io/name: conjur
    app.kubernetes.io/component: postgres
spec:
  serviceName: conjur-postgres
  replicas: 1
  selector:
    matchLabels: *AppPostgresLabels
  template:
    metadata:
      labels: *AppPostgresLabels
      annotations:
        checksum/secrets: 03341cebda6a04c1358347f551ab8e4110a07c3596178dee994fa9f3d69e41bf
    spec:
      securityContext:
        fsGroup: 999
      containers:
      - image: "postgres:15.4"
        imagePullPolicy: Always
        name: postgres
        args: ["-c", "ssl=on", "-c", "ssl_cert_file=/etc/certs/tls.crt", "-c", "ssl_key_file=/etc/certs/tls.key"]
        env:
        - name: POSTGRES_HOST_AUTH_METHOD
          value: password
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: conjur-conjur-database-password
              key: key
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:

        - name: ssl-certs
          mountPath: "/etc/certs"
          readOnly: true
      volumes:

      - name: ssl-certs
        secret:
          secretName: conjur-conjur-database-ssl
          # Set file permissions to 0600 (which corresponds to 384 decimal)
          defaultMode: 384
