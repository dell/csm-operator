# Environment Variable E2E Tests - New Tests Only
# These tests validate environment variable driven image resolution functionality
# This file is separate for easy testing of new functionality only

- scenario: "Test Environment Variable Image Resolution (Minimal, PowerScale)"
  paths:
    - "testfiles/storage_csm_powerscale_version.yaml"
  tags:
    - "env-var-new"
    - "powerscale"
  steps:
    - "Given an environment with k8s or openshift, and CSM operator installed"
    - "Delete ConfigMap"
    - "Set spec version to [${E2E_CSM_VERSION}] in CR spec [1]"
    - "Create StorageClass with template [testfiles/powerscale-templates/powerscale-storageclass-template.yaml] for [powerscale]"
    - "Create Secret with template [testfiles/powerscale-templates/powerscale-secret-template.yaml] name [isilon-creds] in namespace [${E2E_NS_POWERSCALE}] for [powerscale]"
    - "Apply custom resource [1]"
    # Verify image source from environment variable (deployment/daemonset spec check only - images may not exist for in-development versions)
    - "Validate deployment from CR [1] uses environment variable [RELATED_IMAGE_csi-isilon] for container [driver]"
    - "Validate daemonset from CR [1] uses environment variable [RELATED_IMAGE_csi-isilon] for container [driver]"
    # cleanup
    - "Enable forceRemoveDriver on CR [1]"
    - "Delete custom resource [1]"
    - "Validate [powerscale] driver from CR [1] is not installed"
    - "Restore ConfigMap"

