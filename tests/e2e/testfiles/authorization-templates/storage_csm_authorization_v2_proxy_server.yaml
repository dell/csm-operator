apiVersion: storage.dell.com/v1
kind: ContainerStorageModule
metadata:
  name: authorization
  namespace: ${E2E_NS_AUTH}
spec:
  modules:
    # Authorization: enable csm-authorization proxy server for RBAC
    - name: authorization-proxy-server
      # enable: Enable/Disable csm-authorization
      enabled: true
      configVersion: v2.5.0
      forceRemoveModule: true
      components:
        # For Kubernetes Container Platform only (ignored on OpenShift)
        # enabled: Enable/Disable Gateway API Controller (NGINX Gateway Fabric)
        # Allowed values:
        #   true: enable deployment of Gateway API Controller
        #   false: disable deployment of Gateway API Controller only if you have your own gateway.
        # Default value: true
        - name: nginx-gateway-fabric
          enabled: true
        # enabled: Enable/Disable cert-manager
        # Allowed values:
        #   true: enable deployment of cert-manager
        #   false: disable deployment of cert-manager only if it's already deployed
        # Default value: true
        - name: cert-manager
          enabled: true
        - name: proxy-server
          # enable: Enable/Disable csm-authorization proxy server
          enabled: true
          proxyService: csm.artifactory.cec.lab.emc.com/csm-users/cicd/csm-authorization-proxy:nightly
          proxyServiceReplicas: 1
          tenantService: csm.artifactory.cec.lab.emc.com/csm-users/cicd/csm-authorization-tenant:nightly
          tenantServiceReplicas: 1
          roleService: csm.artifactory.cec.lab.emc.com/csm-users/cicd/csm-authorization-role:nightly
          roleServiceReplicas: 1
          storageService: csm.artifactory.cec.lab.emc.com/csm-users/cicd/csm-authorization-storage:nightly
          storageServiceReplicas: 1
          opa: docker.io/openpolicyagent/opa:0.70.0
          opaKubeMgmt: openpolicyagent/kube-mgmt:9.2.1
          authorizationController: csm.artifactory.cec.lab.emc.com/csm-users/cicd/csm-authorization-controller:nightly
          authorizationControllerReplicas: 1
          leaderElection: true
          # controllerReconcileInterval: interval for the authorization controllers to reconcile with Redis.
          controllerReconcileInterval: 5m
          # certificate: base64-encoded certificate for cert/private-key pair -- add certificate here to use custom certificates
          # for self-signed certs, leave empty string
          # Allowed values: string
          certificate: ""
          # privateKey: base64-encoded private key for cert/private-key pair -- add private key here to use custom certificates
          # for self-signed certs, leave empty string
          # Allowed values: string
          privateKey: ""
          # proxy-server Gateway will use this hostname
          # NOTE: an additional hostname can be configured in gateway.hosts
          # NOTE: proxy-server Gateway is configured to accept IP address connections so hostnames are not required
          hostname: "csm-authorization.com"
          # gateway configuration for proxy-server (v2.5.0+)
          gateway:
            gatewayClassName: nginx
            # additional hostnames for the proxy-server HTTPRoute
            hosts:
              - authorization-gateway-nginx.${E2E_NS_AUTH}.svc.cluster.local
            # additional annotations for the proxy-server HTTPRoute
            annotations: {}
        - name: redis
          # Redis credentials are required and can be provided in one of two ways:
          # 1. Directly via redisUsername/redisPassword (a Kubernetes secret will be created automatically)
          # 2. Via a Secret Store CSI driver (specify the SecretProviderClass details below)
          #
          # Option 1: Provide credentials directly
          redisUsername: ""
          redisPassword: ""
          # Option 2: Use a Secret Store CSI driver
          redisSecretProviderClass:
            # Name of the SecretProviderClass that holds the Redis secretObject.
            - secretProviderClassName: array-creds
              # Name of the Kubernetes secret (created by the Secret Store CSI driver) that contains Redis credentials.
              redisSecretName: redis-secret
              # Key in the secret that stores the Redis username.
              redisUsernameKey: username
              # Key in the secret that stores the Redis password.
              redisPasswordKey: password
          redis: redis:8.4.0-alpine
          commander: rediscommander/redis-commander:latest
          redisName: redis-csm
          redisCommander: rediscommander
          sentinel: sentinel
          redisReplicas: 5
        - name: config
          configSecretProviderClass:
            # Name of the SecretProviderClass that holds the config secretObject.
            - secretProviderClassName: array-creds
              # The name of the Kubernetes secret created by the CSI driver
              configSecretName: config-secret
        - name: storage-system-credentials
          secretProviderClasses:
            vault:
              - array-creds
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: csm-config-params
  namespace: ${E2E_NS_AUTH}
data:
  csm-config-params.yaml: |-
    CONCURRENT_STORAGE_REQUESTS: 10
    LOG_LEVEL: debug
    STORAGE_CAPACITY_POLL_INTERVAL: 30s
