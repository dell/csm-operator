apiVersion: v1
kind: ConfigMap
metadata:
  name: csm-images
  namespace: dell-csm-operator
data:
  versions.yaml: |
    - version: v1.16.0
      images:
        cert-manager-cainjector: quay.io/jetstack/cert-manager-cainjector:v1.11.0
        cert-manager-controller: quay.io/jetstack/cert-manager-controller:v1.11.0
        cert-manager-webhook: quay.io/jetstack/cert-manager-webhook:v1.11.0
        proxy-service: csm.artifactory.cec.lab.emc.com/csm-users/cicd/csm-authorization-proxy:nightly
        tenant-service: csm.artifactory.cec.lab.emc.com/csm-users/cicd/csm-authorization-tenant:nightly
        role-service: csm.artifactory.cec.lab.emc.com/csm-users/cicd/csm-authorization-role:nightly
        storage-service: csm.artifactory.cec.lab.emc.com/csm-users/cicd/csm-authorization-storage:nightly
        opa: docker.io/openpolicyagent/opa:0.70.0
        opa-kube-mgmt: docker.io/openpolicyagent/kube-mgmt:9.3.0
        authorization-controller: csm.artifactory.cec.lab.emc.com/csm-users/cicd/csm-authorization-controller:nightly
        redis: redis:8.4.0-alpine
        rediscommander: rediscommander/redis-commander:latest
