apiVersion: storage.dell.com/v1
kind: ContainerStorageModule
metadata:
  name: powermax
  namespace: powermax
spec:
  driver:
    csiDriverType: "powermax"
    configVersion: v2.17.0
    common:
      image: "csm.artifactory.cec.lab.emc.com/csm-users/cicd/csi-powermax:nightly"
      envs:
        - name: X_CSI_MANAGED_ARRAYS
          value: "REPLACE_ARRAYS"
        - name: X_CSI_POWERMAX_PORTGROUPS
          value: "REPLACE_PORTGROUPS"
        - name: X_CSI_TRANSPORT_PROTOCOL
          value: "REPLACE_PROTOCOL"
    forceRemoveDriver: true
    replicas: 1
  modules:
    - name: authorization
      enabled: true
      configVersion: v2.5.0
      components:
        - name: karavi-authorization-proxy
          image: csm.artifactory.cec.lab.emc.com/csm-users/cicd/csm-authorization-sidecar:nightly
          envs:
            - name: "PROXY_HOST"
              value: "authorization-gateway-nginx.authorization.svc.cluster.local"
            - name: "SKIP_CERTIFICATE_VALIDATION"
              value: "true"
