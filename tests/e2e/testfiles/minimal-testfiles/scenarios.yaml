# List of E2E Tests Scenarios for minimal samples

# ---- PowerStore minimal tests ----

- scenario: "Install PowerStore Driver (Minimal, Standalone)"
  paths:
    - "testfiles/minimal-testfiles/storage_csm_powerstore.yaml"
  tags:
    - "powerstore"
  steps:
    - "Given an environment with k8s or openshift, and CSM operator installed"
    - "Create StorageClass with template [testfiles/powerstore-templates/powerstore-storageclass-template.yaml] for [powerstore]"
    - "Create Secret with template [testfiles/powerstore-templates/powerstore-secret-template.yaml] name [powerstore-config] in namespace [${E2E_NS_POWERSTORE}] for [powerstore]"
    - "Apply custom resource [1]"
    - "Validate custom resource [1]"
    - "Validate [powerstore] driver from CR [1] is installed"
    - "Validate [powerstore] driver spec from CR [1]"
    # cleanup
    - "Enable forceRemoveDriver on CR [1]"
    - "Delete custom resource [1]"
    - "Validate [powerstore] driver from CR [1] is not installed"

- scenario: "Install Powerstore Driver (Minimal, With Authorization v2)"
  paths:
    - "testfiles/authorization-templates/storage_csm_authorization_v2_proxy_server.yaml"
    - "../../operatorconfig/moduleconfig/authorization/{authorization-proxy-server}/authorization-crds.yaml"
    - "testfiles/minimal-testfiles/storage_csm_powerstore.yaml"
    - "testfiles/authorization-templates/storage_csm_authorization_v2_template.yaml"
  tags:
    - "authorizationproxyserver"
    - "authorization"
    - "powerstore"
  steps:
    - "Given an environment with k8s or openshift, and CSM operator installed"
    # Configure CR [3] (powerstore base) for authorization
    - "Set metadata name [powerstore] namespace [${E2E_NS_POWERSTORE}] in CR spec [3]"
    - "Enable [authorization] module in CR spec [3]"
    - "Set [authorization] component [karavi-authorization-proxy] env [PROXY_HOST] to [${AUTHORIZATION_HOST}] in CR spec [3]"
    - "Install Authorization CRDs [2]"
    - "Create [authorization-proxy-server] prerequisites from CR [1]"
    - "Create resource with template [testfiles/authorization-templates/storage_csm_authorization_secret_provider_class.yaml] for [powerstoreAuthCRs]"
    - "Apply custom resource [1]"
    - "Validate [authorization-proxy-server] module from CR [1] is installed"
    - "Configure authorization-proxy-server with template [4] for [powerstore] for CR [1]"
    - "Create StorageClass with template [testfiles/powerstore-templates/powerstore-storageclass-template.yaml] for [powerstore]"
    - "Create Secret with template [testfiles/powerstore-templates/powerstore-secret-template-auth.yaml] name [powerstore-config] in namespace [${E2E_NS_POWERSTORE}] for [powerstoreAuth]"
    - "Apply custom resource [3]"
    - "Validate custom resource [3]"
    - "Validate [powerstore] driver from CR [3] is installed"
    - "Validate [authorization] module from CR [3] is installed"
    # cleanup
    - "Enable forceRemoveDriver on CR [3]"
    - "Delete custom resource [3]"
    - "Validate [powerstore] driver from CR [3] is not installed"
    - "Delete Authorization CRs for [powerstore]"
    - "Delete custom resource [1]"
    - "Validate [authorization] module pods from CR [1] is not installed"
    - "Delete Authorization CRDs [2]"

