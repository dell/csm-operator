apiVersion: storage.dell.com/v1
kind: ContainerStorageModule
metadata:
  name: test-powerstore
  namespace: test-powerstore
spec:
  driver:
    replicas: 1
    csiDriverType: "powerstore"
    configVersion: v2.17.0
    common:
      image: "csm.artifactory.cec.lab.emc.com/csm-users/cicd/csi-powerstore:nightly"
      imagePullPolicy: Always
  modules:
    # Authorization: enable csm-authorization for RBAC
    - name: authorization
      # enable: Enable/Disable csm-authorization
      enabled: true
      configVersion: v2.5.0
      components:
        - name: karavi-authorization-proxy
          image: csm.artifactory.cec.lab.emc.com/csm-users/cicd/csm-authorization-sidecar:nightly
          envs:
            - name: "PROXY_HOST"
              value: "authorization-gateway-nginx.authorization.svc.cluster.local"
