    - "testfiles/authorization-templates/storage_csm_authorization_v2_proxy_server_k8s_secret.yaml"
    - "../../operatorconfig/moduleconfig/authorization/v2.5.0/authorization-crds.yaml"
    - "testfiles/authorization-templates/storage_csm_authorization_v2_template_k8s_secret.yaml"
