- scenario: "Install PowerFlex Driver (FS Check)"
  paths:
    - "testfiles/storage_csm_powerflex.yaml"
  tags:
    - "powerflex"
    - "fscheck"
  steps:
    - "Given an environment with k8s or openshift, and CSM operator installed"
    - "Create Secret with template [testfiles/powerflex-templates/powerflex-secret-template.yaml] name [vxflexos-config] in namespace [${E2E_NS_POWERFLEX}] for [powerflex]"
    - "If POWERFLEX_SDC_SFTP_REPO_ENABLED: Generate and Create SFTP Secrets from template [testfiles/powerflex-templates/powerflex-sftp-secret-private.crt] private-secret [sdcsftprepo-private-secret] public-secret [sdcsftprepo-public-secret] in namespace [${E2E_NS_POWERFLEX}] for [powerflex]"
    - "If POWERFLEX_SDC_SFTP_REPO_ENABLED: Set up Powerflex SFTP CR [1]"
    - "Apply custom resource [1]"
    - "Validate custom resource [1]"
    - "Validate [powerstore] driver from CR [1] is installed"
    # Validate initial defaults
    - "Validate [common] env [X_CSI_FS_CHECK_ENABLED] is [] in CSM CR for resource [1]"
    - "Validate [common] env [X_CSI_FS_CHECK_MODE] is [] in CSM CR for resource [1]"
    - "Validate [node] [driver] env [X_CSI_FS_CHECK_ENABLED] is [false] in driver for resource [1]"
    - "Validate [node] [driver] env [X_CSI_FS_CHECK_MODE] is [checkOnly] in driver for resource [1]"
    # Patch CSM CR to enable FS check
    - "Set [common] env [X_CSI_FS_CHECK_ENABLED] to [true] in resource [1]"
    - "Set [common] env [X_CSI_FS_CHECK_MODE] to [checkAndRepair] in resource [1]"
    - "Apply custom resource [1]"
    - "Validate custom resource [1]"
    # Wait for driver to be redeployed and validate new values
    - "Validate [powerstore] driver from CR [1] is installed"
    - "Validate [common] env [X_CSI_FS_CHECK_ENABLED] is [true] in CSM CR for resource [1]"
    - "Validate [common] env [X_CSI_FS_CHECK_MODE] is [checkAndRepair] in CSM CR for resource [1]"
    - "Validate [node] [driver] env [X_CSI_FS_CHECK_ENABLED] is [true] in driver for resource [1]"
    - "Validate [node] [driver] env [X_CSI_FS_CHECK_MODE] is [checkAndRepair] in driver for resource [1]"
    # cleanup
    - "Enable forceRemoveDriver on CR [1]"
    - "Delete custom resource [1]"
    - "Validate [powerstore] driver from CR [1] is not installed"

