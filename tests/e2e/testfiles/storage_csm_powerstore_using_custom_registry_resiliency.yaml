apiVersion: storage.dell.com/v1
kind: ContainerStorageModule
metadata:
  name: powerstore
  namespace: ${E2E_NS_POWERSTORE}
spec:
  version: v1.16.1
  customRegistry: "quay.io/dell/container-storage-modules"
  driver:
    csiDriverType: "powerstore"
    csiDriverSpec:
      fSGroupPolicy: "ReadWriteOnceWithFSType"
      storageCapacity: false
    replicas: 1
    dnsPolicy: ClusterFirstWithHostNet
    forceRemoveDriver: true
    common:
      imagePullPolicy: Always
      envs:
        - name: X_CSI_POWERSTORE_NODE_NAME_PREFIX
          value: "csi-node"
        - name: X_CSI_FC_PORTS_FILTER_FILE_PATH
          value: "/etc/fc-ports-filter"
        - name: KUBELET_CONFIG_DIR
          value: /var/lib/kubelet
        - name: CSI_LOG_LEVEL
          value: debug
        - name: X_CSI_POWERSTORE_API_TIMEOUT
          value: "120s"
    sideCars:
      - name: external-health-monitor
        enabled: false
        args: ["--monitor-interval=60s"]
    controller:
      envs:
        - name: X_CSI_MULTI_NAS_FAILURE_THRESHOLD
          value: "5"
        - name: X_CSI_MULTI_NAS_COOLDOWN_PERIOD
          value: "5m"
        - name: X_CSI_NFS_ACLS
          value: "0777"
        - name: X_CSI_HEALTH_MONITOR_ENABLED
          value: "false"
    node:
      envs:
        - name: "X_CSI_POWERSTORE_ENABLE_CHAP"
          value: "false"
        - name: X_CSI_HEALTH_MONITOR_ENABLED
          value: "false"
        - name: X_CSI_POWERSTORE_MAX_VOLUMES_PER_NODE
          value: "0"
  modules:
    - name: resiliency
      enabled: true
      components:
        - name: podmon-controller
          imagePullPolicy: Always
          args:
            - "--csisock=unix:/var/run/csi/csi.sock"
            - "--labelvalue=csi-powerstore"
            - "--arrayConnectivityPollRate=60"
            - "--driverPath=csi-powerstore.dellemc.com"
            - "--mode=controller"
            - "--skipArrayConnectionValidation=false"
            - "--driver-config-params=/powerstore-config-params/driver-config-params.yaml"
            - "--driverPodLabelValue=dell-storage"
            - "--ignoreVolumelessPods=false"
        - name: podmon-node
          imagePullPolicy: Always
          envs:
            - name: "X_CSI_PODMON_API_PORT"
              value: "8083"
          args:
            - "--csisock=unix:/var/lib/kubelet/plugins/csi-powerstore.dellemc.com/csi_sock"
            - "--labelvalue=csi-powerstore"
            - "--arrayConnectivityPollRate=60"
            - "--driverPath=csi-powerstore.dellemc.com"
            - "--mode=node"
            - "--leaderelection=false"
            - "--driver-config-params=/powerstore-config-params/driver-config-params.yaml"
            - "--driverPodLabelValue=dell-storage"
            - "--ignoreVolumelessPods=false"
