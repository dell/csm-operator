apiVersion: v1
automountServiceAccountToken: true
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/instance: <NAMESPACE>
    app.kubernetes.io/name: nginx-gateway-fabric
    app.kubernetes.io/part-of: nginx-gateway-fabric
    app.kubernetes.io/version: 2.4.2
  name: <NAMESPACE>-nginx-gateway-fabric
  namespace: <NAMESPACE>
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: <NAMESPACE>
    app.kubernetes.io/name: nginx-gateway-fabric
    app.kubernetes.io/part-of: nginx-gateway-fabric
    app.kubernetes.io/version: 2.4.2
  name: <NAMESPACE>-nginx-gateway-fabric
rules:
  - apiGroups:
      - ''
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - ''
    resources:
      - services
      - secrets
      - configmaps
      - serviceaccounts
    verbs:
      - create
      - update
      - delete
      - get
      - list
      - watch
  - apiGroups:
      - ''
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
      - daemonsets
    verbs:
      - create
      - update
      - delete
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - replicasets
    verbs:
      - get
      - list
  - apiGroups:
      - autoscaling
    resources:
      - horizontalpodautoscalers
    verbs:
      - create
      - update
      - delete
      - get
      - list
      - watch
  - apiGroups:
      - ''
    resources:
      - nodes
    verbs:
      - list
  - apiGroups:
      - ''
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - discovery.k8s.io
    resources:
      - endpointslices
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gateways
      - gatewayclasses
      - httproutes
      - referencegrants
      - grpcroutes
      - backendtlspolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gateways/status
      - gatewayclasses/status
      - httproutes/status
      - grpcroutes/status
      - backendtlspolicies/status
    verbs:
      - update
  - apiGroups:
      - gateway.nginx.org
    resources:
      - nginxgateways
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - gateway.nginx.org
    resources:
      - nginxproxies
      - clientsettingspolicies
      - observabilitypolicies
      - upstreamsettingspolicies
      - authenticationfilters
      - proxysettingspolicies
      - ratelimitpolicies
    verbs:
      - list
      - watch
  - apiGroups:
      - gateway.nginx.org
    resources:
      - nginxgateways/status
      - clientsettingspolicies/status
      - observabilitypolicies/status
      - upstreamsettingspolicies/status
      - authenticationfilters/status
      - proxysettingspolicies/status
      - ratelimitpolicies/status
    verbs:
      - update
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
