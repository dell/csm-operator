apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: connectivity-client-docker-k8s
  namespace: <EXISTING_NAMESPACE>
subjects:
  - kind: ServiceAccount
    name: connectivity-client-docker-k8s
    namespace: <CLIENT_NAMESPACE>
roleRef:
  kind: Role
  name: connectivity-client-docker-k8s
  apiGroup: rbac.authorization.k8s.io